<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中学英単語帳</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1e;
    --surface: #131929;
    --surface2: #1c2438;
    --border: rgba(255,255,255,0.07);
    --text: #e8edf8;
    --muted: rgba(232,237,248,0.45);
    --green: #34d399;
    --red: #f87171;
    --accent: #60a5fa;
    --accent-dim: rgba(96,165,250,0.12);
    --yellow: #fbbf24;
    --radius: 22px;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100dvh; display:flex; flex-direction:column; overflow:hidden; -webkit-tap-highlight-color:transparent; }
  .screen { display:none; flex-direction:column; height:100dvh; }
  .screen.active { display:flex; }

  /* ══ MENU ══ */
  .menu-header { padding:44px 22px 6px; flex-shrink:0; }
  .menu-title { font-family:'DM Serif Display',serif; font-size:28px; color:var(--text); margin-bottom:3px; }
  .menu-sub { font-size:12px; color:var(--muted); }
  .menu-tabs { display:flex; gap:6px; padding:12px 22px 0; flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
  .menu-tabs::-webkit-scrollbar { display:none; }
  .tab-btn { flex-shrink:0; border:0.5px solid var(--border); border-radius:20px; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; background:var(--surface); color:var(--muted); transition:background 0.15s,color 0.15s; }
  .tab-btn.active { background:var(--accent-dim); color:var(--accent); border-color:rgba(96,165,250,0.3); }
  .menu-body { flex:1; overflow-y:auto; padding:12px 22px 32px; display:flex; flex-direction:column; gap:10px; }
  .menu-section-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted); margin:6px 0 2px; }
  .menu-card { background:var(--surface); border:0.5px solid var(--border); border-radius:18px; padding:16px 18px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:background 0.15s,transform 0.1s; -webkit-tap-highlight-color:transparent; }
  .menu-card:active { background:var(--surface2); transform:scale(0.98); }
  .menu-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .ic-blue   { background:rgba(96,165,250,0.12); }
  .ic-green  { background:rgba(52,211,153,0.12); }
  .ic-yellow { background:rgba(251,191,36,0.12); }
  .ic-red    { background:rgba(248,113,113,0.12); }
  .ic-purple { background:rgba(167,139,250,0.12); }
  .menu-text { flex:1; }
  .menu-name { font-size:15px; font-weight:600; color:var(--text); margin-bottom:2px; }
  .menu-desc { font-size:12px; color:var(--muted); line-height:1.4; }
  .menu-badge { font-size:12px; font-weight:600; color:var(--muted); background:var(--surface2); border-radius:9px; padding:3px 8px; flex-shrink:0; }
  .menu-badge.red-b { color:var(--red); background:rgba(248,113,113,0.12); }

  /* 品詞グリッド */
  .pos-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
  .pos-card { background:var(--surface); border:0.5px solid var(--border); border-radius:16px; padding:14px; cursor:pointer; display:flex; flex-direction:column; gap:5px; transition:background 0.15s,transform 0.1s; position:relative; overflow:hidden; }
  .pos-card:active { background:var(--surface2); transform:scale(0.97); }
  .pos-card-name { font-size:14px; font-weight:600; color:var(--text); }
  .pos-card-en   { font-size:11px; color:var(--muted); }
  .pos-card-count { font-size:11px; color:var(--accent); }
  .pos-card-prog { position:absolute; bottom:0; left:0; height:3px; background:var(--accent); opacity:0.6; transition:width 0.6s ease; }

  /* 進捗バー */
  .pos-progress { background:var(--surface); border:0.5px solid var(--border); border-radius:16px; padding:14px 16px; }
  .pos-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .pos-row:last-child { margin-bottom:0; }
  .pos-label { font-size:12px; font-weight:500; color:var(--text); width:46px; flex-shrink:0; }
  .pos-bar-wrap { flex:1; height:6px; background:var(--surface2); border-radius:3px; overflow:hidden; }
  .pos-bar-fill { height:100%; border-radius:3px; background:var(--accent); transition:width 0.6s ease; }
  .pos-count { font-size:11px; color:var(--muted); width:52px; text-align:right; flex-shrink:0; }
  .stats-bar { background:var(--surface); border:0.5px solid var(--border); border-radius:14px; padding:12px 16px; display:flex; justify-content:space-around; }
  .sbar-item { text-align:center; }
  .sbar-num { font-size:20px; font-weight:600; }
  .sbar-num.g { color:var(--green); }
  .sbar-num.r { color:var(--red); }
  .sbar-num.a { color:var(--muted); }
  .sbar-label { font-size:11px; color:var(--muted); margin-top:2px; }

  /* ══ STUDY ══ */
  .header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px 6px; flex-shrink:0; }
  .back-btn { font-size:13px; font-weight:500; color:var(--accent); background:var(--accent-dim); border:none; border-radius:20px; padding:6px 13px; cursor:pointer; }
  .session-badge { font-size:12px; font-weight:500; color:var(--accent); background:var(--accent-dim); border-radius:20px; padding:4px 10px; }
  .mode-label { font-size:12px; font-weight:600; color:var(--muted); max-width:120px; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .progress-wrap { padding:0 18px 8px; flex-shrink:0; }
  .progress-bar { height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.4s ease; }
  .progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:5px; }
  .stats { display:flex; gap:8px; padding:0 18px 8px; flex-shrink:0; }
  .stat { flex:1; background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:8px 10px; text-align:center; }
  .stat-num { font-size:19px; font-weight:600; line-height:1; }
  .stat-num.green { color:var(--green); }
  .stat-num.red   { color:var(--red); }
  .stat-num.gray  { color:var(--muted); }
  .stat-label { font-size:10px; color:var(--muted); margin-top:2px; }
  .card-area { flex:1; display:flex; align-items:center; justify-content:center; padding:0 18px; position:relative; overflow:hidden; }
  .card { width:100%; max-width:400px; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:28px 24px; text-align:center; position:relative; cursor:pointer; user-select:none; transition:transform 0.08s ease; will-change:transform; }
  .card:active { transform:scale(0.98); }
  .card-pos-tag { display:inline-block; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; background:var(--accent-dim); color:var(--accent); border-radius:8px; padding:3px 9px; margin-bottom:14px; }
  .word { font-family:'DM Serif Display',serif; font-size:34px; line-height:1.15; color:var(--text); margin-bottom:6px; word-break:break-word; }
  .phonetic { font-size:13px; color:var(--muted); min-height:18px; margin-bottom:14px; }
  .meaning-wrap { min-height:52px; display:flex; align-items:center; justify-content:center; }
  .meaning { font-size:17px; font-weight:500; color:var(--accent); opacity:0; transform:translateY(6px); transition:opacity 0.25s ease,transform 0.25s ease; line-height:1.5; }
  .meaning.visible { opacity:1; transform:translateY(0); }
  .tap-hint { font-size:11px; color:var(--muted); margin-top:14px; transition:opacity 0.3s; }
  .swipe-overlay { position:absolute; inset:0; border-radius:var(--radius); opacity:0; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:700; transition:opacity 0.1s; pointer-events:none; }
  .swipe-overlay.good { background:rgba(52,211,153,0.15); color:var(--green); border:2px solid rgba(52,211,153,0.4); }
  .swipe-overlay.bad  { background:rgba(248,113,113,0.12); color:var(--red);   border:2px solid rgba(248,113,113,0.3); }
  .swipe-guide { display:flex; justify-content:space-between; align-items:center; padding:5px 18px; flex-shrink:0; }
  .guide-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
  .guide-icon { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; }
  .guide-icon.bad  { background:rgba(248,113,113,0.15); }
  .guide-icon.good { background:rgba(52,211,153,0.15); }
  .speak-btn { background:var(--accent-dim); border:0.5px solid rgba(96,165,250,0.25); border-radius:50%; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; flex-shrink:0; }
  .actions { display:flex; gap:10px; padding:5px 18px 18px; flex-shrink:0; }
  .btn { flex:1; border:none; border-radius:14px; padding:14px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:transform 0.1s,opacity 0.1s; }
  .btn:active { transform:scale(0.96); opacity:0.85; }
  .btn-bad  { background:rgba(248,113,113,0.15); color:var(--red); }
  .btn-good { background:rgba(52,211,153,0.15);  color:var(--green); }
  .btn-skip { background:var(--surface2); color:var(--muted); flex:0 0 56px; }

  /* ══ LOADING ══ */
  .loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:99; }
  .spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ══ DONE ══ */
  .done-screen { position:fixed; inset:0; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:0; display:none; overflow:hidden; }
  .done-emoji { font-size:68px; margin-bottom:10px; }
  .done-title { font-family:'DM Serif Display',serif; font-size:26px; color:var(--text); margin-bottom:6px; }
  .score-ring { width:130px; height:130px; position:relative; margin:14px 0; }
  .score-ring svg { transform:rotate(-90deg); }
  .score-ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-big { font-size:30px; font-weight:600; color:var(--text); line-height:1; }
  .score-small { font-size:12px; color:var(--muted); margin-top:2px; }
  .score-detail { font-size:13px; color:var(--muted); margin-bottom:4px; }
  .done-btns { display:flex; gap:10px; margin-top:18px; }
  .btn-done { border:none; border-radius:14px; padding:13px 22px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
  .btn-done.accent  { background:var(--accent-dim); color:var(--accent); }
  .btn-done.surface { background:var(--surface); color:var(--muted); border:0.5px solid var(--border); }

  .confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:200; }
  .confetti-piece { position:absolute; width:10px; height:10px; border-radius:2px; animation:confettiFall linear forwards; }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;} }

  @keyframes slideLeft  { from{transform:translateX(0);opacity:1;}  to{transform:translateX(-120%);opacity:0;} }
  @keyframes slideRight { from{transform:translateX(0);opacity:1;}  to{transform:translateX(120%);opacity:0;} }
  @keyframes slideIn    { from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;} }
  .anim-left  { animation:slideLeft  0.3s ease forwards; }
  .anim-right { animation:slideRight 0.3s ease forwards; }
  .anim-in    { animation:slideIn    0.3s ease forwards; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="font-size:14px;color:var(--muted)" id="loadingMsg">単語を読み込み中…</p>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-emoji" id="doneEmoji">🎉</div>
  <div class="done-title" id="doneTitle">セッション完了！</div>
  <div class="score-ring">
    <svg width="130" height="130" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="54" fill="none" stroke="var(--surface2)" stroke-width="9"/>
      <circle id="scoreArc" cx="65" cy="65" r="54" fill="none" stroke="var(--green)" stroke-width="9"
              stroke-linecap="round" stroke-dasharray="339" stroke-dashoffset="339"
              style="transition:stroke-dashoffset 1s ease,stroke 0.5s ease;"/>
    </svg>
    <div class="score-ring-text">
      <div class="score-big"  id="scoreBig">0</div>
      <div class="score-small" id="scoreSmall">/ 0問</div>
    </div>
  </div>
  <div class="score-detail" id="scoreDetail"></div>
  <div class="done-btns">
    <button class="btn-done surface" onclick="goMenu()">メニューへ</button>
    <button class="btn-done accent"  onclick="restartSame()">もう一度</button>
  </div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ══ MENU ══ -->
<div class="screen active" id="menuScreen">
  <div class="menu-header">
    <div class="menu-title">中学英単語帳</div>
    <div class="menu-sub" id="menuSub">読み込み中…</div>
  </div>
  <div class="menu-tabs">
    <button class="tab-btn active" onclick="switchTab('all')"   id="tab-all">すべて</button>
    <button class="tab-btn"        onclick="switchTab('pos')"   id="tab-pos">品詞別</button>
    <button class="tab-btn"        onclick="switchTab('weak')"  id="tab-weak">苦手克服</button>
    <button class="tab-btn"        onclick="switchTab('stats')" id="tab-stats">進捗</button>
  </div>
  <div class="menu-body" id="menuBody"></div>
</div>

<!-- ══ STUDY ══ -->
<div class="screen" id="studyScreen">
  <div class="header">
    <button class="back-btn" onclick="goMenu()">← メニュー</button>
    <div class="mode-label" id="modeLabel"></div>
    <div class="session-badge" id="sessionBadge">— / —</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label"><span id="progressLeft">0 / 0</span><span id="progressRight">残り 0枚</span></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num green" id="statKnown">0</div><div class="stat-label">正解</div></div>
    <div class="stat"><div class="stat-num red"   id="statRetry">0</div><div class="stat-label">要復習</div></div>
    <div class="stat"><div class="stat-num gray"  id="statTotal">0</div><div class="stat-label">問題数</div></div>
  </div>
  <div class="card-area">
    <div class="card" id="card">
      <div class="swipe-overlay good" id="overlayGood">覚えた ✓</div>
      <div class="swipe-overlay bad"  id="overlayBad">復習する ↩</div>
      <div class="card-pos-tag" id="cardPosTag">英語</div>
      <div class="word"     id="wordEl">---</div>
      <div class="phonetic" id="phoneticEl"></div>
      <div class="meaning-wrap"><div class="meaning" id="meaningEl"></div></div>
      <div class="tap-hint" id="tapHint">タップして意味を見る</div>
    </div>
  </div>
  <div class="swipe-guide">
    <div class="guide-item"><div class="guide-icon bad">←</div><span>要復習</span></div>
    <button class="speak-btn" onclick="speak(queue[cur].word)">🔊</button>
    <div class="guide-item"><span>覚えた</span><div class="guide-icon good">→</div></div>
  </div>
  <div class="actions">
    <button class="btn btn-bad"  onclick="judge(false)">← 復習</button>
    <button class="btn btn-skip" onclick="skipCard()">skip</button>
    <button class="btn btn-good" onclick="judge(true)">覚えた →</button>
  </div>
</div>

<script>
const SHEET_ID = "1GpdD2h-tGfhuFC92qjS1LRrujrFfFkz23VbvbcTL528";
const PARTS_OF_SPEECH = [
  { key:"noun",        name:"名詞",  en:"Noun",        gid:"0",          icon:"📦" },
  { key:"pronoun",     name:"代名詞", en:"Pronoun",     gid:"973845469",  icon:"👤" },
  { key:"verb",        name:"動詞",  en:"Verb",        gid:"997419758",  icon:"🏃" },
  { key:"auxiliary",   name:"助動詞", en:"Auxiliary",   gid:"296755217",  icon:"🔧" },
  { key:"adjective",   name:"形容詞", en:"Adjective",   gid:"1693781741", icon:"🎨" },
  { key:"adverb",      name:"副詞",  en:"Adverb",      gid:"1924216966", icon:"⚡" },
  { key:"preposition", name:"前置詞", en:"Preposition", gid:"1340365523", icon:"📍" },
  { key:"conjunction", name:"接続詞", en:"Conjunction", gid:"931669290",  icon:"🔗" },
];

let wordsByPos = {};
let allWords   = [];
let queue = [], cur = 0, shown = false;
let knownN = 0, retryN = 0, currentMode = "", sessionTotal = 0;
let stats = JSON.parse(localStorage.getItem("juniorVocabStats") || "{}");
let currentTab = "all";

function parseCSV(text, posKey) {
  return text.split(/\r?\n/).slice(1).map(line => {
    if (!line.trim()) return null;
    const cols = []; let buf = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cols.push(buf.trim()); buf = ""; continue; }
      buf += c;
    }
    cols.push(buf.trim());
    let word, meaning;
    if (cols.length >= 3 && !isNaN(cols[0]) && cols[0] !== "") {
      word = cols[1] || ""; meaning = cols[2] || "";
    } else {
      word = cols[0] || ""; meaning = cols[1] || "";
    }
    return word ? { word, meaning, pos: posKey } : null;
  }).filter(Boolean);
}

async function loadAll() {
  const total = PARTS_OF_SPEECH.length;
  let loaded = 0;
  await Promise.all(PARTS_OF_SPEECH.map(async pos => {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${pos.gid}`;
    const text = await fetch(url).then(r => r.text()).catch(() => "");
    wordsByPos[pos.key] = parseCSV(text, pos.key);
    loaded++;
    document.getElementById("loadingMsg").textContent = `読み込み中… ${loaded}/${total}`;
  }));
  allWords = PARTS_OF_SPEECH.flatMap(p => wordsByPos[p.key] || []);
}

function init() {
  loadAll().then(() => {
    document.getElementById("loading").style.display = "none";
    switchTab("all");
    updateMenuSub();
  }).catch(() => {
    document.getElementById("loading").innerHTML =
      `<p style="color:var(--red);text-align:center;padding:20px;font-size:14px">読み込みに失敗しました。<br>インターネット接続を確認してください。</p>`;
  });
}

function updateMenuSub() {
  const known = allWords.filter(w => stats[w.word+"_"+w.pos] === 1).length;
  document.getElementById("menuSub").textContent = `全${allWords.length}語 ・ 覚えた${known}語`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  renderTab(tab);
}

function renderTab(tab) {
  const body = document.getElementById("menuBody");
  if      (tab === "all")   renderAllTab(body);
  else if (tab === "pos")   renderPosTab(body);
  else if (tab === "weak")  renderWeakTab(body);
  else if (tab === "stats") renderStatsTab(body);
}

function mc(icon, ic, name, desc, badge, bc, fn) {
  return `<div class="menu-card" onclick="${fn}">
    <div class="menu-icon ${ic}">${icon}</div>
    <div class="menu-text"><div class="menu-name">${name}</div><div class="menu-desc">${desc}</div></div>
    <div class="menu-badge ${bc||''}">${badge}</div>
  </div>`;
}

function renderAllTab(body) {
  body.innerHTML = `
    <div class="menu-section-label">問題数を選ぶ</div>
    ${mc("🎲","ic-blue","ランダム 10問","毎回違う10問でサクッと練習","10","","startMode('r10')")}
    ${mc("📚","ic-green","ランダム 30問","少し多めにまとめて学習","30","","startMode('r30')")}
    ${mc("🏆","ic-yellow","全単語チャレンジ","全品詞まとめて挑戦","${allWords.length}","","startMode('all')")}`;
}

function renderPosTab(body) {
  let html = `<div class="menu-section-label">品詞を選んで学習</div><div class="pos-grid">`;
  PARTS_OF_SPEECH.forEach(pos => {
    const words = wordsByPos[pos.key] || [];
    const known = words.filter(w => stats[w.word+"_"+w.pos] === 1).length;
    const pct   = words.length ? Math.round(known/words.length*100) : 0;
    html += `<div class="pos-card" onclick="startMode('pos_${pos.key}')">
      <div class="pos-card-name">${pos.icon} ${pos.name}</div>
      <div class="pos-card-en">${pos.en}</div>
      <div class="pos-card-count">覚えた ${known}/${words.length}語</div>
      <div class="pos-card-prog" style="width:${pct}%"></div>
    </div>`;
  });
  html += `</div>`;
  body.innerHTML = html;
}

function renderWeakTab(body) {
  const retryAll   = allWords.filter(w => stats[w.word+"_"+w.pos] === 0).length;
  const unknownAll = allWords.filter(w => stats[w.word+"_"+w.pos] === undefined).length;
  let posRetry = PARTS_OF_SPEECH.map(pos => {
    const n = (wordsByPos[pos.key]||[]).filter(w => stats[w.word+"_"+w.pos] === 0).length;
    return n > 0 ? mc(pos.icon,"ic-red",`${pos.name}の要復習`,`${pos.name}の苦手単語を集中練習`,n,"red-b",`startMode('retry_${pos.key}')`) : "";
  }).join("");
  body.innerHTML = `
    <div class="menu-section-label">苦手を克服しよう</div>
    ${mc("🔥","ic-red","要復習のみ（全品詞）","「← 復習」にした単語を集中練習",retryAll,"red-b","startMode('retry')")}
    ${mc("❓","ic-purple","未挑戦のみ（全品詞）","まだ答えていない単語だけ",unknownAll,"","startMode('unknown')")}
    ${posRetry ? `<div class="menu-section-label" style="margin-top:6px">品詞別・要復習</div>${posRetry}` : ""}`;
}

function renderStatsTab(body) {
  const totalKnown = allWords.filter(w => stats[w.word+"_"+w.pos] === 1).length;
  const totalRetry = allWords.filter(w => stats[w.word+"_"+w.pos] === 0).length;
  const totalPct   = allWords.length ? Math.round(totalKnown/allWords.length*100) : 0;
  const posRows = PARTS_OF_SPEECH.map(pos => {
    const words = wordsByPos[pos.key] || [];
    const known = words.filter(w => stats[w.word+"_"+w.pos] === 1).length;
    const pct   = words.length ? Math.round(known/words.length*100) : 0;
    return `<div class="pos-row">
      <div class="pos-label">${pos.icon}${pos.name}</div>
      <div class="pos-bar-wrap"><div class="pos-bar-fill" style="width:${pct}%"></div></div>
      <div class="pos-count">${known}/${words.length}</div>
    </div>`;
  }).join("");
  body.innerHTML = `
    <div class="stats-bar">
      <div class="sbar-item"><div class="sbar-num g">${totalKnown}</div><div class="sbar-label">覚えた</div></div>
      <div class="sbar-item"><div class="sbar-num r">${totalRetry}</div><div class="sbar-label">要復習</div></div>
      <div class="sbar-item"><div class="sbar-num a">${totalPct}%</div><div class="sbar-label">正解率</div></div>
    </div>
    <div class="pos-progress">${posRows}</div>
    <button onclick="clearStats()" style="background:none;border:0.5px solid var(--border);border-radius:12px;padding:12px;color:var(--muted);font-size:13px;cursor:pointer;margin-top:4px;">記録をリセット</button>`;
}

function clearStats() {
  if (!confirm("学習記録をすべてリセットしますか？")) return;
  stats = {};
  localStorage.removeItem("juniorVocabStats");
  renderTab(currentTab);
  updateMenuSub();
}

const MODE_NAMES = {
  r10:"ランダム10問", r30:"ランダム30問", all:"全単語",
  retry:"要復習（全品詞）", unknown:"未挑戦（全品詞）",
  ...Object.fromEntries(PARTS_OF_SPEECH.map(p => [`pos_${p.key}`, p.name+"のみ"])),
  ...Object.fromEntries(PARTS_OF_SPEECH.map(p => [`retry_${p.key}`, p.name+"の要復習"])),
};

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startMode(mode) {
  currentMode=mode; knownN=0; retryN=0; cur=0;
  let pool=[];
  if      (mode==="r10")     pool=shuffle(allWords).slice(0,10);
  else if (mode==="r30")     pool=shuffle(allWords).slice(0,30);
  else if (mode==="all")     pool=shuffle(allWords);
  else if (mode==="retry")   pool=shuffle(allWords.filter(w=>stats[w.word+"_"+w.pos]===0));
  else if (mode==="unknown") pool=shuffle(allWords.filter(w=>stats[w.word+"_"+w.pos]===undefined));
  else if (mode.startsWith("pos_")) {
    const pk=mode.replace("pos_","");
    pool=shuffle(wordsByPos[pk]||[]);
  } else if (mode.startsWith("retry_")) {
    const pk=mode.replace("retry_","");
    pool=shuffle((wordsByPos[pk]||[]).filter(w=>stats[w.word+"_"+w.pos]===0));
  }
  if (!pool.length) {
    if (mode.includes("retry"))  {alert("要復習の単語がありません！");return;}
    if (mode.includes("unknown")){alert("未挑戦の単語はありません！");return;}
    alert("単語が見つかりません。"); return;
  }
  queue=pool; sessionTotal=pool.length;
  document.getElementById("modeLabel").textContent=MODE_NAMES[mode]||mode;
  document.getElementById("statTotal").textContent=sessionTotal;
  showScreen("studyScreen");
  showCard();
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goMenu() {
  document.getElementById("doneScreen").style.display="none";
  document.getElementById("confettiWrap").innerHTML="";
  updateMenuSub();
  renderTab(currentTab);
  showScreen("menuScreen");
}

function showCard() {
  if (cur>=queue.length){showDone();return;}
  const w=queue[cur]; shown=false;
  const pos=PARTS_OF_SPEECH.find(p=>p.key===w.pos);
  document.getElementById("cardPosTag").textContent = pos ? pos.name : "英語";
  document.getElementById("wordEl").textContent     = w.word;
  document.getElementById("meaningEl").textContent  = w.meaning;
  document.getElementById("meaningEl").classList.remove("visible");
  document.getElementById("tapHint").style.opacity  = "1";
  const total=queue.length, pct=Math.round((cur/total)*100);
  document.getElementById("progressFill").style.width  = pct+"%";
  document.getElementById("progressLeft").textContent  = `${cur} / ${total}`;
  document.getElementById("progressRight").textContent = `残り ${total-cur}枚`;
  document.getElementById("sessionBadge").textContent  = `${cur+1} / ${total}`;
  document.getElementById("statKnown").textContent=knownN;
  document.getElementById("statRetry").textContent=retryN;
}

function revealMeaning() {
  if(shown)return; shown=true;
  document.getElementById("meaningEl").classList.add("visible");
  document.getElementById("tapHint").style.opacity="0";
  speak(queue[cur].word);
}

function speak(text) {
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.9; speechSynthesis.speak(u);
}

function judge(good) {
  const w=queue[cur], key=w.word+"_"+w.pos;
  if(good){stats[key]=1;knownN++;animCard("anim-right");}
  else    {stats[key]=0;retryN++;animCard("anim-left");}
  localStorage.setItem("juniorVocabStats",JSON.stringify(stats));
  setTimeout(()=>{cur++;showCard();},300);
}

function skipCard(){animCard("anim-left");setTimeout(()=>{cur++;showCard();},300);}

function animCard(cls){
  const card=document.getElementById("card");
  card.classList.add(cls);
  setTimeout(()=>{card.classList.remove(cls);card.classList.add("anim-in");setTimeout(()=>card.classList.remove("anim-in"),350);},300);
}

function showDone() {
  const total=sessionTotal, pct=total>0?Math.round(knownN/total*100):0;
  const isPerfect=knownN===total&&total>0;
  let emoji="😊",title="お疲れ様！";
  if(isPerfect){emoji="🏆";title="満点！すごい！";}
  else if(pct>=80){emoji="🎉";title="よくできました！";}
  else if(pct>=50){emoji="💪";title="もう少し！";}
  else{emoji="📖";title="復習しよう！";}
  document.getElementById("doneEmoji").textContent =emoji;
  document.getElementById("doneTitle").textContent =title;
  document.getElementById("scoreBig").textContent  =knownN;
  document.getElementById("scoreSmall").textContent=`/ ${total}問`;
  document.getElementById("scoreDetail").textContent=`正解率 ${pct}%　（要復習 ${retryN}語）`;
  const arc=document.getElementById("scoreArc");
  arc.style.stroke=isPerfect?"#fbbf24":pct>=80?"var(--green)":pct>=50?"var(--accent)":"var(--red)";
  document.getElementById("doneScreen").style.display="flex";
  setTimeout(()=>{arc.style.strokeDashoffset=339-(339*pct/100);},100);
  if(pct>=80)launchConfetti(isPerfect?120:60);
}

function launchConfetti(count){
  const wrap=document.getElementById("confettiWrap"); wrap.innerHTML="";
  const colors=["#60a5fa","#34d399","#fbbf24","#f87171","#a78bfa","#e8edf8"];
  for(let i=0;i<count;i++){
    const el=document.createElement("div"); el.className="confetti-piece";
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*1.2}s`;
    wrap.appendChild(el);
  }
  setTimeout(()=>{wrap.innerHTML="";},4000);
}

function restartSame(){
  document.getElementById("doneScreen").style.display="none";
  document.getElementById("confettiWrap").innerHTML="";
  document.getElementById("scoreArc").style.strokeDashoffset="339";
  startMode(currentMode);
}

// ── Swipe ──
let startX=0,startY=0,dragging=false;
const card=document.getElementById("card"),oGood=document.getElementById("overlayGood"),oBad=document.getElementById("overlayBad");
card.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=false;},{passive:true});
card.addEventListener("touchmove",e=>{
  const dx=e.touches[0].clientX-startX;
  if(Math.abs(dx)<8&&!dragging)return; dragging=true;
  card.style.transform=`translateX(${dx*0.4}px) rotate(${dx*0.02}deg)`;
  const str=Math.min(Math.abs(dx)/80,1);
  if(dx>20){oGood.style.opacity=str;oBad.style.opacity=0;}
  else if(dx<-20){oBad.style.opacity=str;oGood.style.opacity=0;}
  else{oGood.style.opacity=oBad.style.opacity=0;}
},{passive:true});
card.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;
  card.style.transform="";oGood.style.opacity=oBad.style.opacity=0;
  if(!dragging&&Math.abs(dx)<10&&Math.abs(dy)<10){revealMeaning();return;}
  if(dx>60){judge(true);return;}if(dx<-60){judge(false);return;}
},{passive:true});

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
init();
</script>
</body>
</html>

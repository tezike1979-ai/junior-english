<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中学英単語・熟語</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d1117;
  --surface:  #161b27;
  --surface2: #1e2535;
  --surface3: #252e42;
  --border:   rgba(99,179,237,0.12);
  --border2:  rgba(99,179,237,0.22);
  --text:     #e2e8f8;
  --muted:    rgba(226,232,248,0.38);
  --blue:     #63b3ed;
  --blue-dim: rgba(99,179,237,0.10);
  --cyan:     #67e8f9;
  --cyan-dim: rgba(103,232,249,0.10);
  --green:    #4ade80;
  --green-dim:rgba(74,222,128,0.10);
  --red:      #f87171;
  --red-dim:  rgba(248,113,113,0.10);
  --purple:   #a78bfa;
  --purple-dim:rgba(167,139,250,0.10);
  --amber:    #fbbf24;
  --radius:   16px;
  --glow:     0 0 20px rgba(99,179,237,0.15);
}
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* グリッド背景 */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.screen { display: none; flex-direction: column; height: 100dvh; position: relative; z-index: 1; }
.screen.active { display: flex; }

/* ══ MENU ══ */
.menu-header { padding: 48px 22px 6px; flex-shrink: 0; }
.menu-title {
  font-size: 26px; font-weight: 800; letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.menu-sub { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 3px; letter-spacing: 0.3px; }

.menu-tabs {
  display: flex; gap: 6px;
  padding: 12px 22px 0;
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.menu-tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0;
  border: 1px solid var(--border);
  border-radius: 20px; padding: 7px 15px;
  font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--surface); color: var(--muted);
  transition: all 0.2s; letter-spacing: 0.2px;
}
.tab-btn.active {
  background: var(--blue-dim); color: var(--blue);
  border-color: rgba(99,179,237,0.35);
  box-shadow: 0 0 12px rgba(99,179,237,0.12);
}

.menu-body {
  flex: 1; overflow-y: auto;
  padding: 12px 22px 32px;
  display: flex; flex-direction: column; gap: 10px;
}

.menu-section-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.8px; color: var(--muted); margin: 8px 0 2px;
}

.menu-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 15px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.menu-card:active {
  background: var(--surface2);
  border-color: var(--border2);
  box-shadow: var(--glow);
}
.menu-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  border: 1px solid var(--border);
}
.ic-blue   { background: var(--blue-dim); }
.ic-cyan   { background: var(--cyan-dim); }
.ic-green  { background: var(--green-dim); }
.ic-red    { background: var(--red-dim); }
.ic-purple { background: var(--purple-dim); }
.ic-amber  { background: rgba(251,191,36,0.10); }
.menu-text { flex: 1; }
.menu-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; letter-spacing: 0.1px; }
.menu-desc { font-size: 12px; color: var(--muted); font-weight: 500; }
.menu-badge {
  font-size: 12px; font-weight: 700;
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 3px 9px; flex-shrink: 0;
  letter-spacing: 0.2px;
}
.menu-badge.red-b { color: var(--red); background: var(--red-dim); border-color: rgba(248,113,113,0.2); }

/* 品詞グリッド */
.pos-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
.pos-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 13px 13px; cursor: pointer;
  display: flex; flex-direction: column; gap: 4px;
  transition: border-color 0.2s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.pos-card:active { border-color: var(--border2); box-shadow: var(--glow); }
.pos-card-name { font-size: 14px; font-weight: 700; color: var(--text); }
.pos-card-en   { font-size: 11px; color: var(--muted); font-weight: 500; }
.pos-card-count { font-size: 11px; color: var(--blue); font-weight: 600; }
.pos-card-prog {
  position: absolute; bottom: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  transition: width 0.6s ease;
}
.pos-card-clear {
  position: absolute; top: 8px; right: 8px;
  font-size: 14px; line-height: 1;
}
.pos-sub-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.pos-sub-card:active { border-color: var(--border2); box-shadow: var(--glow); }
.pos-sub-left { display: flex; flex-direction: column; gap: 3px; }
.pos-sub-name { font-size: 14px; font-weight: 700; color: var(--text); }
.pos-sub-count { font-size: 11px; color: var(--blue); font-weight: 600; }
.pos-sub-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.pos-sub-clear { font-size: 16px; }
.pos-sub-bar-wrap { width: 60px; height: 4px; background: var(--surface3, #252e42); border-radius: 2px; overflow: hidden; }
.pos-sub-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--blue), var(--cyan)); transition: width 0.6s ease; }

/* 進捗 */
.pos-progress {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.pos-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.pos-row:last-child { margin-bottom: 0; }
.pos-label { font-size: 12px; font-weight: 600; color: var(--text); width: 48px; flex-shrink: 0; }
.pos-bar-wrap {
  flex: 1; height: 6px;
  background: var(--surface2); border-radius: 3px; overflow: hidden;
}
.pos-bar-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  transition: width 0.6s ease;
}
.pos-count { font-size: 11px; color: var(--muted); font-weight: 600; width: 52px; text-align: right; flex-shrink: 0; }
.stats-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  display: flex; justify-content: space-around;
}
.sbar-item { text-align: center; }
.sbar-num { font-size: 22px; font-weight: 800; }
.sbar-num.g { color: var(--green); }
.sbar-num.r { color: var(--red); }
.sbar-num.a { color: var(--blue); }
.sbar-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 2px; }

/* ══ STUDY ══ */
.study-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px 6px; flex-shrink: 0;
}
.back-btn {
  font-size: 13px; font-weight: 700; color: var(--blue);
  background: var(--blue-dim); border: 1px solid rgba(99,179,237,0.25);
  border-radius: 20px; padding: 6px 14px; cursor: pointer;
  letter-spacing: 0.2px;
}
.session-badge {
  font-size: 12px; font-weight: 700; color: var(--cyan);
  background: var(--cyan-dim); border: 1px solid rgba(103,232,249,0.2);
  border-radius: 20px; padding: 4px 11px;
}
.mode-label {
  font-size: 12px; font-weight: 600; color: var(--muted);
  max-width: 110px; text-align: center;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.progress-wrap { padding: 0 18px 8px; flex-shrink: 0; }
.progress-bar {
  height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(99,179,237,0.5);
}
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 5px; }

.study-stats { display: flex; gap: 8px; padding: 0 18px 8px; flex-shrink: 0; }
.stat {
  flex: 1; background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 9px 10px; text-align: center;
}
.stat-num { font-size: 20px; font-weight: 800; line-height: 1; }
.stat-num.green  { color: var(--green); }
.stat-num.red    { color: var(--red); }
.stat-num.gray   { color: var(--muted); }
.stat-label { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 2px; letter-spacing: 0.3px; }

.card-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 0 18px; position: relative; overflow: hidden;
}

/* スキャンライン演出 */
.card-area::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(99,179,237,0.012) 3px,
    rgba(99,179,237,0.012) 4px
  );
  z-index: 0;
}

.card {
  width: 100%; max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 30px 26px;
  text-align: center; position: relative;
  cursor: pointer; user-select: none;
  box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: transform 0.08s ease;
  will-change: transform; z-index: 1;
}
.card:active { transform: scale(0.98); }

/* カード上部のライン */
.card::before {
  content: '';
  position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
  opacity: 0.4;
}

.card-pos-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  background: var(--blue-dim); color: var(--blue);
  border: 1px solid rgba(99,179,237,0.25);
  border-radius: 6px; padding: 3px 10px; margin-bottom: 16px;
}
.word {
  font-size: 36px; font-weight: 800; letter-spacing: -0.5px;
  color: var(--text); margin-bottom: 6px; word-break: break-word;
  line-height: 1.15;
}
.phonetic { font-size: 13px; color: var(--muted); font-weight: 500; min-height: 18px; margin-bottom: 16px; }
.meaning-wrap { min-height: 56px; display: flex; align-items: center; justify-content: center; }
.meaning {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.25s ease, transform 0.25s ease; line-height: 1.5;
}
.meaning.visible { opacity: 1; transform: translateY(0); }
.tap-hint {
  font-size: 12px; color: var(--muted); font-weight: 500;
  margin-top: 16px; transition: opacity 0.3s; letter-spacing: 0.2px;
}
.example-wrap {
  margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.25s ease, transform 0.25s ease;
  display: none;
}
.example-wrap.visible { opacity: 1; transform: translateY(0); display: block; }
.example-en {
  font-size: 16px; font-weight: 600; color: var(--cyan);
  line-height: 1.6; margin-bottom: 6px; font-style: italic;
}
.example-ja { font-size: 15px; color: var(--muted); font-weight: 500; line-height: 1.5; }
.tap-hint2 {
  font-size: 11px; color: rgba(103,232,249,0.45); font-weight: 500;
  margin-top: 10px; letter-spacing: 0.2px; display: none;
}
.tap-hint2.show { display: block; }

.swipe-overlay {
  position: absolute; inset: 0; border-radius: 20px;
  opacity: 0; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; transition: opacity 0.1s; pointer-events: none;
  letter-spacing: 0.5px;
}
.swipe-overlay.good {
  background: linear-gradient(135deg, rgba(74,222,128,0.12), rgba(74,222,128,0.06));
  color: var(--green); border: 1px solid rgba(74,222,128,0.3);
}
.swipe-overlay.bad {
  background: linear-gradient(135deg, rgba(248,113,113,0.10), rgba(248,113,113,0.05));
  color: var(--red); border: 1px solid rgba(248,113,113,0.25);
}

.swipe-guide {
  display: flex; justify-content: space-between; align-items: center;
  padding: 5px 18px; flex-shrink: 0;
}
.guide-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); font-weight: 600; }
.guide-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  border: 1px solid var(--border);
}
.guide-icon.bad  { background: var(--red-dim); color: var(--red); }
.guide-icon.good { background: var(--green-dim); color: var(--green); }
.speak-btn {
  background: var(--purple-dim); border: 1px solid rgba(167,139,250,0.25);
  border-radius: 50%; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; flex-shrink: 0;
  transition: box-shadow 0.2s;
}
.speak-btn:active { box-shadow: 0 0 12px rgba(167,139,250,0.3); }

.actions { display: flex; gap: 10px; padding: 5px 18px 18px; flex-shrink: 0; }
.btn {
  flex: 1; border: 1px solid var(--border); border-radius: 14px; padding: 14px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
  letter-spacing: 0.2px;
}
.btn:active { transform: scale(0.97); }
.btn-bad  { background: var(--red-dim);   color: var(--red);   border-color: rgba(248,113,113,0.2); }
.btn-bad:active  { box-shadow: 0 0 16px rgba(248,113,113,0.2); }
.btn-good { background: var(--green-dim); color: var(--green); border-color: rgba(74,222,128,0.2); }
.btn-good:active { box-shadow: 0 0 16px rgba(74,222,128,0.2); }
.btn-skip { background: var(--surface2);  color: var(--muted); flex: 0 0 60px; }

/* ══ LOADING ══ */
.loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; z-index: 99;
}
.loading-ring {
  width: 48px; height: 48px;
  border: 2px solid var(--border2);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  box-shadow: 0 0 16px rgba(99,179,237,0.2);
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }

/* ══ DONE ══ */
.done-screen {
  position: fixed; inset: 0; background: var(--bg);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 0; display: none; overflow: hidden; z-index: 50;
}
.done-screen.visible { display: flex; }

/* DONE 背景光 */
.done-screen::before {
  content: ''; position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(99,179,237,0.06) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}

.done-emoji { font-size: 64px; margin-bottom: 10px; }
.done-title {
  font-size: 26px; font-weight: 800; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--blue), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.score-ring { width: 130px; height: 130px; position: relative; margin: 14px 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-big { font-size: 32px; font-weight: 800; color: var(--text); line-height: 1; }
.score-small { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 2px; }
.score-detail { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
.done-btns { display: flex; gap: 10px; margin-top: 18px; }
.btn-done {
  border: 1px solid var(--border); border-radius: 14px; padding: 13px 22px;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: box-shadow 0.2s, transform 0.1s;
}
.btn-done:active { transform: scale(0.97); }
.btn-done.accent {
  background: var(--blue-dim); color: var(--blue);
  border-color: rgba(99,179,237,0.3);
}
.btn-done.accent:active { box-shadow: 0 0 20px rgba(99,179,237,0.2); }
.btn-done.surface { background: var(--surface2); color: var(--muted); }

/* confetti */
.confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
.confetti-piece { position: absolute; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@keyframes slideLeft  { from{transform:translateX(0);opacity:1;} to{transform:translateX(-120%);opacity:0;} }
@keyframes slideRight { from{transform:translateX(0);opacity:1;} to{transform:translateX(120%);opacity:0;} }
@keyframes slideIn    { from{transform:translateX(40px);opacity:0;} to{transform:translateX(0);opacity:1;} }
.anim-left  { animation: slideLeft  0.3s ease forwards; }
.anim-right { animation: slideRight 0.3s ease forwards; }
.anim-in    { animation: slideIn    0.3s ease forwards; }
</style>
</head>
<body>

<!-- ══ LOADING ══ -->
<div class="loading" id="loading">
  <div class="loading-ring"></div>
  <div class="loading-text" id="loadingMsg">データを読み込んでいます…</div>
</div>

<!-- ══ DONE ══ -->
<div class="done-screen" id="doneScreen">
  <div class="done-emoji" id="doneEmoji">🎉</div>
  <div class="done-title" id="doneTitle">セッション完了</div>
  <div class="score-ring">
    <svg width="130" height="130" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="54" fill="none" stroke="rgba(99,179,237,0.12)" stroke-width="10"/>
      <circle id="scoreArc" cx="65" cy="65" r="54" fill="none" stroke="#4ade80" stroke-width="10"
              stroke-linecap="round" stroke-dasharray="339" stroke-dashoffset="339"
              style="transition:stroke-dashoffset 1s ease, stroke 0.5s ease; filter:drop-shadow(0 0 6px currentColor)"/>
    </svg>
    <div class="score-ring-text">
      <div class="score-big"  id="scoreBig">0</div>
      <div class="score-small" id="scoreSmall">/ 0問</div>
    </div>
  </div>
  <div class="score-detail" id="scoreDetail"></div>
  <div class="done-btns">
    <button class="btn-done surface" onclick="goMenu()">メニューへ</button>
    <button class="btn-done accent"  onclick="restartSame()">もう一度</button>
  </div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ══ MENU SCREEN ══ -->
<div class="screen active" id="menuScreen">
  <div class="menu-header">
    <div class="menu-title">中学英単語・熟語</div>
    <div class="menu-sub" id="menuSub">読み込み中…</div>
    <div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:0.5px;opacity:0.6">ver 1.00</div>
  </div>
  <div class="menu-tabs">
    <button class="tab-btn active" onclick="switchTab('all')"   id="tab-all">すべて</button>
    <button class="tab-btn"        onclick="switchTab('pos')"   id="tab-pos">品詞別</button>
    <button class="tab-btn"        onclick="switchTab('weak')"  id="tab-weak">苦手克服</button>
    <button class="tab-btn"        onclick="switchTab('stats')" id="tab-stats">進捗</button>
  </div>
  <div class="menu-body" id="menuBody"></div>
</div>

<!-- ══ STUDY SCREEN ══ -->

<script>
const SHEET_ID = "1GpdD2h-tGfhuFC92qjS1LRrujrFfFkz23VbvbcTL528";
const PARTS_OF_SPEECH = [
  { key:"noun",        name:"名詞",  en:"Noun",        gid:"0",          icon:"📦" },
  { key:"pronoun",     name:"代名詞", en:"Pronoun",     gid:"973845469",  icon:"👤" },
  { key:"verb",        name:"動詞",  en:"Verb",        gid:"997419758",  icon:"🏃" },
  { key:"auxiliary",   name:"助動詞", en:"Auxiliary",   gid:"296755217",  icon:"🔧" },
  { key:"adjective",   name:"形容詞", en:"Adjective",   gid:"1693781741", icon:"🎨" },
  { key:"adverb",      name:"副詞",  en:"Adverb",      gid:"1924216966", icon:"⚡" },
  { key:"preposition", name:"前置詞", en:"Preposition", gid:"1340365523", icon:"📍" },
  { key:"conjunction", name:"接続詞", en:"Conjunction", gid:"931669290",  icon:"🔗" },
  { key:"idiom",       name:"熟語",  en:"Idiom",       gid:"2096441416", icon:"💬", isIdiom:true },
];

let wordsByPos = {}, allWords = [];
let queue = [], cur = 0, tapCount = 0;
let knownN = 0, retryN = 0, currentMode = "", sessionTotal = 0;
let stats = JSON.parse(localStorage.getItem("juniorVocabStats") || "{}");
let currentTab = "all";

function parseCSV(text, posKey) {
  const posObj = PARTS_OF_SPEECH.find(p => p.key === posKey);
  const isIdiom = posObj && posObj.isIdiom;

  // ── クォート内の改行を正しく扱うため、文字単位でレコード分割 ──
  function splitRecords(raw) {
    const records = []; let cur = "", inQ = false;
    for (let i = 0; i < raw.length; i++) {
      const c = raw[i];
      if (c === '"') {
        // 連続する "" はエスケープされた引用符
        if (inQ && raw[i+1] === '"') { cur += '"'; i++; continue; }
        inQ = !inQ;
      } else if ((c === '\n' || (c === '\r' && raw[i+1] === '\n')) && !inQ) {
        if (c === '\r') i++; // CRLF スキップ
        records.push(cur); cur = "";
      } else {
        cur += c;
      }
    }
    if (cur.trim()) records.push(cur);
    return records;
  }

  // ── 1レコード（行）をカラム配列に分解 ──
  function splitCols(line) {
    const cols = []; let buf = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { buf += '"'; i++; continue; }
        inQ = !inQ;
      } else if (c === ',' && !inQ) {
        cols.push(buf.trim()); buf = "";
      } else {
        buf += c;
      }
    }
    cols.push(buf.trim());
    return cols;
  }

  const records = splitRecords(text);
  return records.slice(1).map(line => {
    if (!line.trim()) return null;
    const cols = splitCols(line);
    // A=番号, B=単語/熟語, C=意味, D=例文(英), E=日本語訳
    let word, meaning, exEn = "", exJa = "";
    if (cols.length >= 3 && !isNaN(cols[0]) && cols[0] !== "") {
      word = cols[1] || ""; meaning = cols[2] || "";
      exEn = cols[3] || ""; exJa = cols[4] || "";  // 全品詞で読み込む
    } else {
      word = cols[0] || ""; meaning = cols[1] || "";
      exEn = cols[2] || ""; exJa = cols[3] || "";  // 全品詞で読み込む
    }
    // セル内改行（\n）をスペースに変換して1行に整形
    meaning = meaning.replace(/\n/g, ' / ');
    exEn    = exEn.replace(/\n/g, ' ');
    exJa    = exJa.replace(/\n/g, ' ');
    return word ? { word, meaning, pos: posKey, exEn, exJa } : null;
  }).filter(Boolean);
}

async function loadAll() {
  const total = PARTS_OF_SPEECH.length; let loaded = 0;
  await Promise.all(PARTS_OF_SPEECH.map(async pos => {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${pos.gid}`;
    const text = await fetch(url).then(r => r.text()).catch(() => "");
    wordsByPos[pos.key] = parseCSV(text, pos.key);
    loaded++;
    document.getElementById("loadingMsg").textContent = `データを読み込んでいます… ${loaded}/${total}`;
  }));
  allWords = PARTS_OF_SPEECH.flatMap(p => wordsByPos[p.key] || []);
}

// 品詞ごとのシャッフル済み順序を localStorage に保存・復元
function getFixedOrder(posKey, words) {
  const storageKey = "vocabOrder_" + posKey;
  const saved = localStorage.getItem(storageKey);
  if (saved) {
    try {
      const savedWords = JSON.parse(saved);
      // 保存済みの順序に合わせて並び替え（新規追加分は末尾に）
      const wordMap = Object.fromEntries(words.map(w => [w.word, w]));
      const ordered = savedWords
        .filter(w => wordMap[w])
        .map(w => wordMap[w]);
      const newWords = words.filter(w => !savedWords.includes(w.word));
      return [...ordered, ...newWords];
    } catch(e) {}
  }
  // 初回：シャッフルして保存
  const shuffled = shuffle(words);
  localStorage.setItem(storageKey, JSON.stringify(shuffled.map(w => w.word)));
  return shuffled;
}

function init() {
  loadAll().then(() => {
    // 各品詞をシャッフルして固定順序に並び替え
    PARTS_OF_SPEECH.forEach(pos => {
      if (wordsByPos[pos.key] && wordsByPos[pos.key].length > 0) {
        wordsByPos[pos.key] = getFixedOrder(pos.key, wordsByPos[pos.key]);
      }
    });
    allWords = PARTS_OF_SPEECH.flatMap(p => wordsByPos[p.key] || []);
    document.getElementById("loading").style.display = "none";
    switchTab("all");
    updateMenuSub();
  }).catch(() => {
    document.getElementById("loading").innerHTML =
      `<p style="color:var(--red);text-align:center;padding:20px;font-size:14px;font-weight:600">読み込みに失敗しました。<br>インターネット接続を確認してください。</p>`;
  });
}

function updateMenuSub() {
  const known = allWords.filter(w => stats[w.word+"_"+w.pos] === 1).length;
  document.getElementById("menuSub").textContent = `全 ${allWords.length} 語 ・ 習得済み ${known} 語`;
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  renderTab(tab);
}

function renderTab(tab) {
  const body = document.getElementById("menuBody");
  if      (tab==="all")   renderAllTab(body);
  else if (tab==="pos")   renderPosTab(body);
  else if (tab==="weak")  renderWeakTab(body);
  else if (tab==="stats") renderStatsTab(body);
}

function mc(icon, ic, name, desc, badge, bc, fn) {
  return `<div class="menu-card" onclick="${fn}">
    <div class="menu-icon ${ic}">${icon}</div>
    <div class="menu-text"><div class="menu-name">${name}</div><div class="menu-desc">${desc}</div></div>
    <div class="menu-badge ${bc||''}">${badge}</div>
  </div>`;
}

function renderAllTab(body) {
  body.innerHTML = `
    <div class="menu-section-label">問題数を選択</div>
    ${mc("🎲","ic-blue","ランダム 10問","ランダムな10問でクイック練習","10","","startMode('r10')")}
    ${mc("📚","ic-cyan","ランダム 30問","30問でしっかり練習","30","","startMode('r30')")}
    ${mc("🏆","ic-amber","全単語チャレンジ","全品詞まとめて挑戦","${allWords.length}語","","startMode('all')")}`;
}

// 品詞の語数を30語単位で分割（端数は最後のグループに混ぜる）
const CHUNK = 30;
function makeChunks(words) {
  if (words.length <= CHUNK) return [words];
  // 端数が9語以下になるなら前のグループに吸収
  const MIN_LAST = 10;
  const chunks = [];
  let start = 0;
  let remaining = words.length;
  while (remaining > 0) {
    if (remaining <= CHUNK + MIN_LAST) {
      // 残りをまとめて最後のグループに
      chunks.push(words.slice(start));
      break;
    }
    chunks.push(words.slice(start, start + CHUNK));
    start += CHUNK;
    remaining -= CHUNK;
  }
  return chunks;
}

function chunkClearMark(posKey, chunkIdx, chunkWords) {
  const allKnown = chunkWords.every(w => stats[w.word+"_"+w.pos] === 1);
  return allKnown && chunkWords.length > 0 ? "✅" : "";
}

function posClearMark(posKey, words) {
  if (!words.length) return "";
  return words.every(w => stats[w.word+"_"+w.pos] === 1) ? "✅" : "";
}

function renderPosTab(body) {
  let html = `<div class="menu-section-label">品詞を選んで学習</div><div class="pos-grid">`;
  PARTS_OF_SPEECH.forEach(pos => {
    const words = wordsByPos[pos.key] || [];
    const known = words.filter(w => stats[w.word+"_"+w.pos] === 1).length;
    const pct   = words.length ? Math.round(known/words.length*100) : 0;
    const clear = posClearMark(pos.key, words);
    const chunks = makeChunks(words);
    const needSub = chunks.length > 1;
    const onclick = needSub
      ? `showPosDetail('${pos.key}')`
      : `startMode('pos_${pos.key}')`;
    html += `<div class="pos-card" onclick="${onclick}">
      <div class="pos-card-name">${pos.icon} ${pos.name}${needSub ? ' ›' : ''}</div>
      <div class="pos-card-en">${pos.en}</div>
      <div class="pos-card-count">${known} / ${words.length} 語</div>
      ${clear ? `<div class="pos-card-clear">${clear}</div>` : ''}
      <div class="pos-card-prog" style="width:${pct}%"></div>
    </div>`;
  });
  html += `</div>`;
  body.innerHTML = html;
}

function showPosDetail(posKey) {
  const pos   = PARTS_OF_SPEECH.find(p => p.key === posKey);
  const words = wordsByPos[posKey] || [];
  const chunks = makeChunks(words);
  const known  = words.filter(w => stats[w.word+"_"+w.pos] === 1).length;
  const pct    = words.length ? Math.round(known/words.length*100) : 0;
  const clear  = posClearMark(posKey, words);

  const body = document.getElementById("menuBody");
  let html = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <button onclick="renderPosTab(document.getElementById('menuBody'))"
        style="background:var(--blue-dim);border:1px solid rgba(99,179,237,0.25);border-radius:20px;
               padding:6px 13px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;
               color:var(--blue);cursor:pointer;">← 戻る</button>
      <span style="font-size:16px;font-weight:700;color:var(--text)">${pos.icon} ${pos.name}</span>
      <span style="font-size:12px;color:var(--muted);font-weight:600">${known}/${words.length}語 ${clear}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">`;

  chunks.forEach((chunk, i) => {
    const label = `${pos.name}${i+1}`;
    const cKnown  = chunk.filter(w => stats[w.word+"_"+w.pos] === 1).length;
    const cPct    = chunk.length ? Math.round(cKnown/chunk.length*100) : 0;
    const cClear  = chunkClearMark(posKey, i, chunk);
    // chunk を startMode で渡せるよう index で管理
    html += `
      <div class="pos-sub-card" onclick="startModeChunk('${posKey}',${i})">
        <div class="pos-sub-left">
          <div class="pos-sub-name">${label}</div>
          <div class="pos-sub-count">${cKnown} / ${chunk.length} 語</div>
        </div>
        <div class="pos-sub-right">
          ${cClear ? `<span class="pos-sub-clear">${cClear}</span>` : ''}
          <div class="pos-sub-bar-wrap">
            <div class="pos-sub-bar-fill" style="width:${cPct}%"></div>
          </div>
        </div>
      </div>`;
  });
  html += `
      <div class="pos-sub-card" onclick="startMode('pos_${posKey}')"
        style="border-color:rgba(99,179,237,0.2);background:var(--blue-dim);">
        <div class="pos-sub-left">
          <div class="pos-sub-name" style="color:var(--blue)">${pos.name} 全部</div>
          <div class="pos-sub-count">${words.length} 語まとめて</div>
        </div>
        <div class="pos-sub-right">
          <div class="pos-sub-bar-wrap">
            <div class="pos-sub-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
    </div>`;
  body.innerHTML = html;
}

function renderWeakTab(body) {
  const retryAll   = allWords.filter(w => stats[w.word+"_"+w.pos] === 0).length;
  const unknownAll = allWords.filter(w => stats[w.word+"_"+w.pos] === undefined).length;
  let posRetry = PARTS_OF_SPEECH.map(pos => {
    const n = (wordsByPos[pos.key]||[]).filter(w => stats[w.word+"_"+w.pos] === 0).length;
    return n > 0 ? mc(pos.icon,"ic-red",`${pos.name}の要復習`,`${pos.name}の苦手単語を集中練習`,n,"red-b",`startMode('retry_${pos.key}')`) : "";
  }).join("");
  body.innerHTML = `
    <div class="menu-section-label">苦手克服</div>
    ${mc("🔥","ic-red","要復習のみ（全品詞）","要復習マークの単語を集中練習",retryAll,"red-b","startMode('retry')")}
    ${mc("❓","ic-purple","未挑戦のみ（全品詞）","まだ挑戦していない単語",unknownAll,"","startMode('unknown')")}
    ${posRetry ? `<div class="menu-section-label" style="margin-top:8px">品詞別・要復習</div>${posRetry}` : ""}`;
}

function renderStatsTab(body) {
  const totalKnown = allWords.filter(w => stats[w.word+"_"+w.pos] === 1).length;
  const totalRetry = allWords.filter(w => stats[w.word+"_"+w.pos] === 0).length;
  const totalPct   = allWords.length ? Math.round(totalKnown/allWords.length*100) : 0;
  const posRows = PARTS_OF_SPEECH.map(pos => {
    const words = wordsByPos[pos.key] || [];
    const known = words.filter(w => stats[w.word+"_"+w.pos] === 1).length;
    const pct   = words.length ? Math.round(known/words.length*100) : 0;
    return `<div class="pos-row">
      <div class="pos-label">${pos.icon} ${pos.name}</div>
      <div class="pos-bar-wrap"><div class="pos-bar-fill" style="width:${pct}%"></div></div>
      <div class="pos-count">${known}/${words.length}</div>
    </div>`;
  }).join("");
  body.innerHTML = `
    <div class="stats-bar">
      <div class="sbar-item"><div class="sbar-num g">${totalKnown}</div><div class="sbar-label">習得済み</div></div>
      <div class="sbar-item"><div class="sbar-num r">${totalRetry}</div><div class="sbar-label">要復習</div></div>
      <div class="sbar-item"><div class="sbar-num a">${totalPct}%</div><div class="sbar-label">正解率</div></div>
    </div>
    <div class="pos-progress">${posRows}</div>
    <button onclick="clearStats()" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.2px;">記録をリセット</button>`;
}

function clearStats() {
  if (!confirm("学習記録と単語の並び順をすべてリセットしますか？")) return;
  stats = {};
  localStorage.removeItem("juniorVocabStats");
  // シャッフル順序もリセット
  PARTS_OF_SPEECH.forEach(pos => {
    localStorage.removeItem("vocabOrder_" + pos.key);
  });
  renderTab(currentTab);
  updateMenuSub();
}

const MODE_NAMES = {
  r10:"ランダム10問", r30:"ランダム30問", all:"全単語",
  retry:"要復習（全品詞）", unknown:"未挑戦（全品詞）",
  ...Object.fromEntries(PARTS_OF_SPEECH.map(p => [`pos_${p.key}`, p.name+"のみ"])),
  ...Object.fromEntries(PARTS_OF_SPEECH.map(p => [`retry_${p.key}`, p.name+"の要復習"])),
};

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// チャンク（小分類）モード用
function startModeChunk(posKey, chunkIdx) {
  const pos    = PARTS_OF_SPEECH.find(p => p.key === posKey);
  const words  = wordsByPos[posKey] || [];
  const chunks = makeChunks(words);
  const chunk  = chunks[chunkIdx] || [];
  const label  = `${pos ? pos.name : posKey}${chunkIdx+1}`;
  if (!chunk.length) { alert("単語が見つかりません。"); return; }
  currentMode = `chunk_${posKey}_${chunkIdx}`;
  knownN=0; retryN=0; cur=0;
  queue = [...chunk]; sessionTotal = chunk.length;
  document.getElementById("modeLabel").textContent = label;
  document.getElementById("statTotal").textContent  = sessionTotal;
  showScreen("studyScreen");
  showCard();
}

function startMode(mode) {
  currentMode=mode; knownN=0; retryN=0; cur=0;
  let pool=[];
  if      (mode==="r10")     pool=shuffle(allWords).slice(0,10);
  else if (mode==="r30")     pool=shuffle(allWords).slice(0,30);
  else if (mode==="all")     pool=shuffle(allWords);
  else if (mode==="retry")   pool=shuffle(allWords.filter(w=>stats[w.word+"_"+w.pos]===0));
  else if (mode==="unknown") pool=shuffle(allWords.filter(w=>stats[w.word+"_"+w.pos]===undefined));
  else if (mode.startsWith("pos_")) {
    const pk=mode.replace("pos_",""); pool=[...(wordsByPos[pk]||[])];
  } else if (mode.startsWith("retry_")) {
    const pk=mode.replace("retry_","");
    pool=shuffle((wordsByPos[pk]||[]).filter(w=>stats[w.word+"_"+w.pos]===0));
  }
  if (!pool.length) {
    if (mode.includes("retry"))  { alert("要復習の単語がありません。"); return; }
    if (mode.includes("unknown")){ alert("未挑戦の単語はありません。"); return; }
    alert("単語が見つかりません。"); return;
  }
  queue=pool; sessionTotal=pool.length;
  document.getElementById("modeLabel").textContent=MODE_NAMES[mode]||mode;
  document.getElementById("statTotal").textContent=sessionTotal;
  showScreen("studyScreen");
  showCard();
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goMenu() {
  document.getElementById("doneScreen").classList.remove("visible");
  document.getElementById("confettiWrap").innerHTML="";
  updateMenuSub();
  renderTab(currentTab);
  showScreen("menuScreen");
}

function isIdiom(w) {
  const p = PARTS_OF_SPEECH.find(p => p.key === w.pos);
  return p && p.isIdiom;
}

function showCard() {
  if (cur>=queue.length){showDone();return;}
  const w=queue[cur]; tapCount=0;
  const pos=PARTS_OF_SPEECH.find(p=>p.key===w.pos);
  document.getElementById("cardPosTag").textContent = pos ? pos.name : "英語";
  document.getElementById("wordEl").textContent     = w.word;
  document.getElementById("meaningEl").textContent  = w.meaning;
  document.getElementById("meaningEl").classList.remove("visible");
  // 例文エリアリセット
  const ew=document.getElementById("exampleWrap");
  const th2=document.getElementById("tapHint2");
  ew.classList.remove("visible"); ew.style.display="none";
  th2.classList.remove("show");
  document.getElementById("tapHint").style.opacity="1";
  // 例文がある場合は2回目タップ案内を準備（単語・熟語共通）
  th2.textContent="もう一度タップで例文を表示";
  const total=queue.length, pct=Math.round((cur/total)*100);
  document.getElementById("progressFill").style.width  = pct+"%";
  document.getElementById("progressLeft").textContent  = `${cur} / ${total}`;
  document.getElementById("progressRight").textContent = `残り ${total-cur}枚`;
  document.getElementById("sessionBadge").textContent  = `${cur+1} / ${total}`;
  document.getElementById("statKnown").textContent=knownN;
  document.getElementById("statRetry").textContent=retryN;
}

function revealMeaning() {
  const w = queue[cur];
  tapCount++;
  if (tapCount === 1) {
    // 1回目：意味表示
    document.getElementById("meaningEl").classList.add("visible");
    document.getElementById("tapHint").style.opacity="0";
    speak(w.word);
    // 例文がある場合は2回目タップのヒントを表示
    if (w.exEn) {
      document.getElementById("tapHint2").classList.add("show");
    }
  } else if (tapCount === 2 && w.exEn) {
    // 2回目：例文表示（単語・熟語共通）
    const ew=document.getElementById("exampleWrap");
    document.getElementById("exampleEn").textContent = w.exEn || "";
    document.getElementById("exampleJa").textContent = w.exJa || "";
    ew.style.display="block";
    setTimeout(()=>ew.classList.add("visible"),10);
    document.getElementById("tapHint2").classList.remove("show");
    speak(w.exEn || w.word);
  }
}

function speak(text) {
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.9; speechSynthesis.speak(u);
}

function judge(good) {
  const w=queue[cur], key=w.word+"_"+w.pos;
  if(good){stats[key]=1;knownN++;animCard("anim-right");}
  else    {stats[key]=0;retryN++;animCard("anim-left");}
  localStorage.setItem("juniorVocabStats",JSON.stringify(stats));
  setTimeout(()=>{cur++;showCard();},300);
}

function skipCard(){animCard("anim-left");setTimeout(()=>{cur++;showCard();},300);}

function animCard(cls){
  const card=document.getElementById("card");
  card.classList.add(cls);
  setTimeout(()=>{card.classList.remove(cls);card.classList.add("anim-in");setTimeout(()=>card.classList.remove("anim-in"),350);},300);
}

function showDone() {
  const total=sessionTotal, pct=total>0?Math.round(knownN/total*100):0;
  const isPerfect=knownN===total&&total>0;
  let emoji="😊", title="セッション完了";
  if      (isPerfect){ emoji="🏆"; title="完璧！満点達成！"; }
  else if (pct>=80)  { emoji="🎉"; title="よくできました！"; }
  else if (pct>=50)  { emoji="💪"; title="もう少しです！"; }
  else               { emoji="📖"; title="復習しましょう！"; }
  document.getElementById("doneEmoji").textContent  = emoji;
  document.getElementById("doneTitle").textContent  = title;
  document.getElementById("scoreBig").textContent   = knownN;
  document.getElementById("scoreSmall").textContent = `/ ${total}問`;
  document.getElementById("scoreDetail").textContent= `正解率 ${pct}%　（要復習 ${retryN}語）`;
  const arc=document.getElementById("scoreArc");
  arc.style.stroke=isPerfect?"#fbbf24":pct>=80?"#4ade80":pct>=50?"#63b3ed":"#f87171";
  document.getElementById("doneScreen").classList.add("visible");
  setTimeout(()=>{arc.style.strokeDashoffset=339-(339*pct/100);},100);
  if(pct>=80)launchConfetti(isPerfect?130:65);
}

function launchConfetti(count){
  const wrap=document.getElementById("confettiWrap"); wrap.innerHTML="";
  const colors=["#63b3ed","#67e8f9","#4ade80","#a78bfa","#fbbf24","#f87171","#e2e8f8"];
  for(let i=0;i<count;i++){
    const el=document.createElement("div"); el.className="confetti-piece";
    const size=5+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${size}px;height:${size}px;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*1.2}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
    wrap.appendChild(el);
  }
  setTimeout(()=>{wrap.innerHTML="";},4000);
}

function restartSame(){
  document.getElementById("doneScreen").classList.remove("visible");
  document.getElementById("confettiWrap").innerHTML="";
  document.getElementById("scoreArc").style.strokeDashoffset="339";
  startMode(currentMode);
}

// ── Swipe ──
let startX=0,startY=0,dragging=false;
const card=document.getElementById("card"),oGood=document.getElementById("overlayGood"),oBad=document.getElementById("overlayBad");
card.addEventListener("touchstart",e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;dragging=false;},{passive:true});
card.addEventListener("touchmove",e=>{
  const dx=e.touches[0].clientX-startX;
  if(Math.abs(dx)<8&&!dragging)return; dragging=true;
  card.style.transform=`translateX(${dx*0.4}px) rotate(${dx*0.02}deg)`;
  const str=Math.min(Math.abs(dx)/80,1);
  if(dx>20){oGood.style.opacity=str;oBad.style.opacity=0;}
  else if(dx<-20){oBad.style.opacity=str;oGood.style.opacity=0;}
  else{oGood.style.opacity=oBad.style.opacity=0;}
},{passive:true});
card.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY;
  card.style.transform="";oGood.style.opacity=oBad.style.opacity=0;
  if(!dragging&&Math.abs(dx)<10&&Math.abs(dy)<10){revealMeaning();return;}
  if(dx>60){judge(true);return;}if(dx<-60){judge(false);return;}
},{passive:true});

if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
init();
</script>
